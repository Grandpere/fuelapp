# see https://symfony.com/doc/current/reference/configuration/framework.html
framework:
    secret: '%env(APP_SECRET)%'
    rate_limiter:
        nominatim_geocoding:
            policy: 'fixed_window'
            limit: 1
            interval: '1 second'
        api_login:
            policy: 'fixed_window'
            limit: 5
            interval: '5 minutes'
        api_import_upload:
            policy: 'fixed_window'
            limit: 20
            interval: '5 minutes'
        api_import_bulk:
            policy: 'fixed_window'
            limit: 10
            interval: '5 minutes'

    # Note that the session will be started ONLY if you read or write from it.
    session:
        cookie_secure: auto
        cookie_httponly: true
        cookie_samesite: lax

    #esi: true
    #fragments: true

when@test:
    framework:
        test: true
        session:
            storage_factory_id: session.storage.factory.mock_file
