monolog:
    channels:
        - deprecation
    handlers:
        main:
            type: stream
            path: php://stdout
            level: info
            formatter: monolog.formatter.json
            channels: ['!event']
        console:
            type: console
            process_psr_3_messages: false
            channels: ['!event', '!doctrine', '!console']
        deprecation:
            type: stream
            channels: [deprecation]
            path: php://stderr
            formatter: monolog.formatter.json

when@test:
    monolog:
        handlers:
            main:
                type: stream
                path: '%kernel.logs_dir%/%kernel.environment%.log'
                level: warning
                channels: ['!event']
            deprecation:
                type: stream
                channels: [deprecation]
                path: '%kernel.logs_dir%/%kernel.environment%.deprecations.log'
