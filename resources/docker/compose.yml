services:
  app:
    build:
      context: ../..
      dockerfile: Dockerfile
    ports:
      - "${APP_PORT:-8080}:80"
    environment:
      APP_ENV: ${APP_ENV:-dev}
      DEFAULT_URI: ${DEFAULT_URI:-http://localhost:8081}
      DATABASE_URL: "postgresql://${POSTGRES_USER:-app}:${POSTGRES_PASSWORD:-!ChangeMe!}@database:5432/${POSTGRES_DB:-app}?serverVersion=${POSTGRES_VERSION:-16}&charset=utf8"
      REDIS_URL: "redis://:${REDIS_PASSWORD:-!ChangeMe!}@redis:6379"
      MESSENGER_TRANSPORT_DSN: "amqp://${RABBITMQ_DEFAULT_USER:-app}:${RABBITMQ_DEFAULT_PASS:-!ChangeMe!}@rabbitmq:5672/%2f"
      MERCURE_URL: "http://mercure/.well-known/mercure"
      MERCURE_PUBLIC_URL: "http://localhost:${MERCURE_PORT:-3000}/.well-known/mercure"
      MERCURE_JWT_SECRET: "${MERCURE_JWT_SECRET:-!ChangeMe!}"
      OTEL_PHP_AUTOLOAD_ENABLED: "${OTEL_PHP_AUTOLOAD_ENABLED:-true}"
      OTEL_SERVICE_NAME: "${OTEL_SERVICE_NAME:-fuelapp}"
      OTEL_TRACES_EXPORTER: "${OTEL_TRACES_EXPORTER:-otlp}"
      OTEL_METRICS_EXPORTER: "${OTEL_METRICS_EXPORTER:-otlp}"
      OTEL_LOGS_EXPORTER: "${OTEL_LOGS_EXPORTER:-none}"
      OTEL_EXPORTER_OTLP_PROTOCOL: "${OTEL_EXPORTER_OTLP_PROTOCOL:-http/protobuf}"
      OTEL_EXPORTER_OTLP_ENDPOINT: "${OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel-collector:4318}"
      OTEL_EXPORTER_OTLP_TIMEOUT: "${OTEL_EXPORTER_OTLP_TIMEOUT:-1000}"
    depends_on:
      - database
      - redis
      - rabbitmq
      - mercure
    volumes:
      - ../..:/app

###> doctrine/doctrine-bundle ###
  database:
    image: postgres:${POSTGRES_VERSION:-16}-alpine
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-app}
      POSTGRES_USER: ${POSTGRES_USER:-app}
      # You should definitely change the password in production
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-!ChangeMe!}
    volumes:
      - database_data:/var/lib/postgresql/data
        # You may use a bind-mounted host directory instead, so that it is harder to accidentally remove the volume and lose all your data!
        # - ./docker/db/data:/var/lib/postgresql/data:rw
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-app} -d ${POSTGRES_DB:-app}"]
      interval: 5s
      timeout: 5s
      retries: 5
###< doctrine/doctrine-bundle ###

  redis:
    image: redis:${REDIS_VERSION:-7}-alpine
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:-!ChangeMe!}"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-!ChangeMe!}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  rabbitmq:
    image: rabbitmq:${RABBITMQ_VERSION:-3}-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-app}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-!ChangeMe!}
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"
      - "${RABBITMQ_MANAGEMENT_PORT:-15672}:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  mercure:
    image: dunglas/mercure:${MERCURE_VERSION:-v0.17}
    environment:
      SERVER_NAME: ":80"
      MERCURE_PUBLISHER_JWT_KEY: ${MERCURE_JWT_SECRET:-!ChangeMe!}
      MERCURE_SUBSCRIBER_JWT_KEY: ${MERCURE_JWT_SECRET:-!ChangeMe!}
      MERCURE_EXTRA_DIRECTIVES: |
        anonymous
        cors_origins ${MERCURE_CORS_ORIGINS:-http://localhost:8080}
    ports:
      - "${MERCURE_PORT:-3000}:80"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/.well-known/mercure"]
      interval: 10s
      timeout: 5s
      retries: 5

  init-clickhouse:
    image: clickhouse/clickhouse-server:${CLICKHOUSE_VERSION:-25.5.6}
    profiles: ["observability"]
    command:
      - bash
      - -c
      - |
        version="v0.0.1"
        node_os=$$(uname -s | tr '[:upper:]' '[:lower:]')
        node_arch=$$(uname -m | sed s/aarch64/arm64/ | sed s/x86_64/amd64/)
        cd /tmp
        wget -O histogram-quantile.tar.gz "https://github.com/SigNoz/signoz/releases/download/histogram-quantile%2F$${version}/histogram-quantile_$${node_os}_$${node_arch}.tar.gz"
        tar -xvzf histogram-quantile.tar.gz
        mv histogram-quantile /var/lib/clickhouse/user_scripts/histogramQuantile
    restart: on-failure
    volumes:
      - clickhouse_user_scripts:/var/lib/clickhouse/user_scripts

  zookeeper-1:
    image: signoz/zookeeper:3.7.1
    profiles: ["observability"]
    user: root
    volumes:
      - zookeeper_1:/bitnami/zookeeper
    environment:
      - ZOO_SERVER_ID=1
      - ALLOW_ANONYMOUS_LOGIN=yes
      - ZOO_AUTOPURGE_INTERVAL=1
      - ZOO_ENABLE_PROMETHEUS_METRICS=yes
      - ZOO_PROMETHEUS_METRICS_PORT_NUMBER=9141
    healthcheck:
      test: ["CMD-SHELL", "curl -s -m 2 http://localhost:8080/commands/ruok | grep error | grep null"]
      interval: 30s
      timeout: 5s
      retries: 3

  clickhouse:
    image: clickhouse/clickhouse-server:${CLICKHOUSE_VERSION:-25.5.6}
    profiles: ["observability"]
    depends_on:
      init-clickhouse:
        condition: service_completed_successfully
      zookeeper-1:
        condition: service_healthy
    environment:
      CLICKHOUSE_SKIP_USER_SETUP: "1"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - clickhouse_log:/var/log/clickhouse-server
      - clickhouse_user_scripts:/var/lib/clickhouse/user_scripts
      - ./signoz/clickhouse-cluster.xml:/etc/clickhouse-server/config.d/cluster.xml
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "0.0.0.0:8123/ping"]
      interval: 10s
      timeout: 5s
      retries: 20

  signoz-telemetrystore-migrator:
    image: signoz/signoz-otel-collector:${OTELCOL_TAG:-v0.142.0}
    profiles: ["observability"]
    depends_on:
      clickhouse:
        condition: service_healthy
    environment:
      - SIGNOZ_OTEL_COLLECTOR_CLICKHOUSE_DSN=tcp://clickhouse:9000
      - SIGNOZ_OTEL_COLLECTOR_CLICKHOUSE_CLUSTER=cluster
      - SIGNOZ_OTEL_COLLECTOR_CLICKHOUSE_REPLICATION=true
      - SIGNOZ_OTEL_COLLECTOR_TIMEOUT=10m
    entrypoint:
      - /bin/sh
    command:
      - -c
      - |
        /signoz-otel-collector migrate bootstrap &&
        /signoz-otel-collector migrate sync up &&
        /signoz-otel-collector migrate async up
    restart: on-failure

  signoz:
    image: signoz/signoz:${SIGNOZ_VERSION:-v0.113.0}
    profiles: ["observability"]
    depends_on:
      clickhouse:
        condition: service_healthy
      signoz-telemetrystore-migrator:
        condition: service_completed_successfully
    environment:
      SIGNOZ_TELEMETRYSTORE_PROVIDER: "${SIGNOZ_TELEMETRYSTORE_PROVIDER:-clickhouse}"
      SIGNOZ_TELEMETRYSTORE_CLICKHOUSE_DSN: "${SIGNOZ_TELEMETRYSTORE_CLICKHOUSE_DSN:-tcp://clickhouse:9000}"
      SIGNOZ_TOKENIZER_JWT_SECRET: "${SIGNOZ_TOKENIZER_JWT_SECRET:-ChangeMeToAtLeast32CharsForSigNozJwt}"
      SIGNOZ_JWT_SECRET: "${SIGNOZ_JWT_SECRET:-ChangeMeToAtLeast32CharsForSigNozJwt}"
      SIGNOZ_SQLSTORE_SQLITE_PATH: /var/lib/signoz/signoz.db
    ports:
      - "${SIGNOZ_PORT:-3301}:8080"
    volumes:
      - signoz_data:/var/lib/signoz
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "localhost:8080/api/v1/health"]
      interval: 15s
      timeout: 5s
      retries: 10

  otel-collector:
    image: signoz/signoz-otel-collector:${OTELCOL_TAG:-v0.142.0}
    profiles: ["observability"]
    depends_on:
      clickhouse:
        condition: service_healthy
      signoz-telemetrystore-migrator:
        condition: service_completed_successfully
      signoz:
        condition: service_healthy
    entrypoint:
      - /bin/sh
    command:
      - -c
      - |
        /signoz-otel-collector migrate sync check &&
        /signoz-otel-collector --config=/etc/otel-collector-config.yaml --copy-path=/var/tmp/collector-config.yaml --feature-gates=-pkg.translator.prometheus.NormalizeName
    volumes:
      - ./signoz/otel-collector-config.yaml:/etc/otel-collector-config.yaml
    environment:
      - OTEL_RESOURCE_ATTRIBUTES=host.name=signoz-host,os.type=linux
      - LOW_CARDINAL_EXCEPTION_GROUPING=false
      - SIGNOZ_OTEL_COLLECTOR_CLICKHOUSE_DSN=tcp://clickhouse:9000
      - SIGNOZ_OTEL_COLLECTOR_CLICKHOUSE_CLUSTER=cluster
      - SIGNOZ_OTEL_COLLECTOR_CLICKHOUSE_REPLICATION=true
      - SIGNOZ_OTEL_COLLECTOR_TIMEOUT=10m
    ports:
      - "${SIGNOZ_OTLP_GRPC_PORT:-14317}:4317"
      - "${SIGNOZ_OTLP_HTTP_PORT:-14318}:4318"

volumes:
  database_data:
  rabbitmq_data:
  redis_data:
  signoz_data:
  clickhouse_data:
  clickhouse_log:
  clickhouse_user_scripts:
  zookeeper_1:
